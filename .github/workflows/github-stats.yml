name: 更新 GitHub 统计卡片
on:
  schedule:
    - cron: "0 0 * * *"  # 每天0点自动更新
  workflow_dispatch:     # 支持手动触发更新

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      # 生成个人统计卡片
      - name: 生成 GitHub Stats 卡片
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=wty2019wty&show_icons=true&theme=dark&locale=cn
          path: assets/github-stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      # 生成常用语言卡片
      - name: 生成 Top Languages 卡片
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=wty2019wty&layout=compact&show_icons=true&theme=dark&locale=cn
          path: assets/github-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      # 提交并推送文件
      - name: 提交更新
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/*.svg
          git commit -m "Update GitHub stats cards" || exit 0
          git push
